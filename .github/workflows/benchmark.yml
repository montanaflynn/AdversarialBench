name: Run Benchmarks

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        run: npm ci && npm run build

      - name: Run matrix benchmark
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node dist/ci.js matrix --config ./agents.flagship.json --db /tmp/bench.db

      - name: Upload results
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.BENCHMARK_API_KEY }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @/tmp/bench.db \
            "${{ secrets.BENCHMARK_API_URL }}/api/results"

name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 213.111.152.198 >> ~/.ssh/known_hosts

      - name: Deploy
        timeout-minutes: 15
        run: |
          ssh -o ConnectTimeout=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            god@213.111.152.198 'bash -s' << 'EOF'
          set -e
          export GIT_TERMINAL_PROMPT=0
          export GIT_SSH_COMMAND="ssh -o IdentitiesOnly=yes -o IdentityFile=/dev/null"

          REPO_DIR=/opt/adversarialbench-src
          DEPLOY_DIR=/opt/adversarialbench

          if [ -d "$REPO_DIR/.git" ]; then
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main
          else
            git clone https://github.com/montanaflynn/AdversarialBench.git "$REPO_DIR"
            cd "$REPO_DIR"
          fi

          cd "$REPO_DIR/web"
          npm ci
          npx next build

          cp -r .next/standalone/* "$DEPLOY_DIR/"
          mkdir -p "$DEPLOY_DIR/.next/static"
          cp -r .next/static/* "$DEPLOY_DIR/.next/static/"

          cd "$DEPLOY_DIR"
          npm install better-sqlite3 2>/dev/null

          sudo systemctl restart adversarialbench
          echo "Deploy complete!"
          EOF

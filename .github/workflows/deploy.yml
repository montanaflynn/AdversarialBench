name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 213.111.152.198 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          cat > /tmp/deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          export GIT_TERMINAL_PROMPT=0

          REPO_DIR=/opt/adversarialbench-src
          DEPLOY_DIR=/opt/adversarialbench

          if [ -d "$REPO_DIR/.git" ]; then
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main
          else
            git clone https://github.com/montanaflynn/AdversarialBench.git "$REPO_DIR"
            cd "$REPO_DIR"
          fi

          cd "$REPO_DIR/web"
          npm ci
          npx next build

          cp -r .next/standalone/* "$DEPLOY_DIR/"
          mkdir -p "$DEPLOY_DIR/.next/static"
          cp -r .next/static/* "$DEPLOY_DIR/.next/static/"

          cd "$DEPLOY_DIR"
          npm install better-sqlite3 2>/dev/null

          sudo systemctl restart adversarialbench
          SCRIPT

          scp /tmp/deploy.sh god@213.111.152.198:/tmp/deploy.sh
          ssh god@213.111.152.198 "bash /tmp/deploy.sh && rm /tmp/deploy.sh"

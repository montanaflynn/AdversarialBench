name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build
        run: cd web && npx next build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 213.111.152.198 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          # Stage deploy files
          mkdir -p /tmp/deploy/.next
          cp -r web/.next/standalone/web/* /tmp/deploy/
          cp -r web/.next/static /tmp/deploy/.next/static

          # Upload tarball
          tar czf /tmp/deploy.tar.gz -C /tmp/deploy .
          scp /tmp/deploy.tar.gz god@213.111.152.198:/tmp/deploy.tar.gz

          # Extract and restart
          ssh god@213.111.152.198 'set -e; cd /opt/adversarialbench; tar xzf /tmp/deploy.tar.gz; npm install better-sqlite3 --prefer-offline 2>/dev/null; sudo systemctl restart adversarialbench; rm /tmp/deploy.tar.gz'
